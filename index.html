<!DOCTYPE html>
<html lang="es" x-data="app()" :class="{ 'dark': dark }" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketPlayer — Música en tu Apple Watch, sin iPhone</title>
  <meta name="description" content="PocketPlayer es la app independiente para Apple Watch que reproduce tu música local sin necesidad de iPhone. Open source y gratuita." />
  <meta property="og:title"       content="PocketPlayer — Música en tu Apple Watch" />
  <meta property="og:description" content="Reproduce tu música directamente desde el Apple Watch, sin iPhone. Transfiere canciones desde iCloud o el iPhone con un toque." />
  <meta property="og:type"        content="website" />

  <!-- Tailwind config MUST be inline, before the CDN script -->
  <script>
    tailwind = { config: {
      darkMode: 'class',
      theme: { extend: {
        colors: { neon: '#B2F4FF', ocean: '#00182F', blue: '#1567A8', deep: '#002641' },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      }},
    }}
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  <!--
    app.js defines app() BEFORE Alpine initialises.
    Alpine uses defer, so it runs after DOM + after this sync script = app() is always defined.
  -->
  <script src="app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body
  class="font-sans antialiased transition-colors duration-300"
  :class="dark ? 'bg-ocean text-gray-100' : 'bg-white text-gray-900'"
  x-cloak
>

<!-- ══════════════════════════════════════
     NAV
══════════════════════════════════════ -->
<nav
  class="fixed top-0 inset-x-0 z-50 transition-all duration-300"
  :class="dark
    ? 'bg-ocean/90 border-b border-blue/30 backdrop-blur-md'
    : 'bg-white/95 border-b border-[#1567A8]/20 backdrop-blur-md shadow-sm'"
>
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

    <!-- Logo -->
    <a href="#hero" class="flex items-center gap-2">
      <span class="w-8 h-8 rounded-xl flex items-center justify-center text-lg font-black"
        :class="dark ? 'bg-neon/10 text-neon neon-text' : 'bg-blue text-white'">▶</span>
      <span class="font-bold text-base tracking-tight"
        :class="dark ? 'text-neon neon-text' : 'text-blue'">PocketPlayer</span>
      <span class="text-xs px-2 py-0.5 rounded-full font-semibold border"
        :class="dark ? 'bg-neon/10 text-neon border-neon/30' : 'bg-blue/10 text-blue border-blue/30'">Beta</span>
    </a>

    <!-- Desktop nav links -->
    <div class="hidden md:flex items-center gap-6 text-sm font-medium">
      <template x-for="item in navItems" :key="item.href">
        <a :href="item.href" x-text="item.label"
          class="transition-colors"
          :class="dark
            ? 'text-gray-300 hover:text-neon'
            : 'text-gray-600 hover:text-[#1567A8]'"></a>
      </template>
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-3">
      <button @click="toggleLang()"
        class="px-3 py-1.5 rounded-lg text-xs font-semibold border transition-all"
        :class="dark ? 'border-neon/30 text-neon hover:bg-neon/10' : 'border-blue/30 text-blue hover:bg-blue/10'"
        x-text="lang === 'es' ? '🌐 EN' : '🌐 ES'">
      </button>
      <button @click="dark = !dark"
        class="w-9 h-9 rounded-xl flex items-center justify-center border transition-all"
        :class="dark
          ? 'bg-neon/10 border-neon/40 text-neon hover:bg-neon/20'
          : 'bg-[#1567A8] border-[#1567A8] text-white hover:bg-[#125088]'">
        <span x-text="dark ? '☀️' : '🌙'" class="text-base leading-none"></span>
      </button>
      <a href="https://github.com/albertolicea00/PocketPlayer" target="_blank"
        class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-semibold border transition-all neon-btn"
        :class="dark ? 'border-neon/40 text-neon bg-neon/5' : 'border-blue/40 text-blue bg-blue/5'">
        <!-- GitHub icon -->
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483
            0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466
            -.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832
            .092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688
            -.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004
            1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7
            1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.92.359.31.678.921.678 1.856 0
            1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484
            17.522 2 12 2z"/>
        </svg>
        GitHub
      </a>
    </div>
  </div>
</nav>

<!-- ══════════════════════════════════════
     1 · HERO
══════════════════════════════════════ -->
<section id="hero"
  class="min-h-screen flex flex-col items-center justify-center pt-24 pb-16 px-4 text-center relative overflow-hidden"
  :class="dark ? 'bg-hero-dark' : 'bg-hero-light'"
>
  <!-- BG blur blobs -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 rounded-full opacity-10 blur-3xl"
      :class="dark ? 'bg-neon' : 'bg-blue'"></div>
    <div class="absolute top-1/2 left-1/4 w-64 h-64 rounded-full opacity-5 blur-3xl bg-blue"></div>
  </div>

  <!-- Beta badge — 2 · TAGLINE area -->
  <div class="relative glow-pulse inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-6 border"
    :class="dark ? 'bg-neon/10 border-neon/30 text-neon' : 'bg-blue/10 border-blue/30 text-blue'">
    <span class="w-2 h-2 rounded-full animate-pulse" :class="dark ? 'bg-neon' : 'bg-blue'"></span>
    <span x-text="t('hero.badge')"></span>
  </div>

  <h1 class="relative text-5xl sm:text-6xl md:text-7xl font-black leading-tight mb-4"
    :class="dark ? 'text-white' : 'text-gray-900'">
    <span x-text="t('hero.title1')"></span><br />
    <span class="neon-text" :class="dark ? 'text-neon' : 'text-blue'"
      x-text="t('hero.title2')"></span>
  </h1>

  <p class="relative text-lg sm:text-xl max-w-2xl mx-auto mb-10 leading-relaxed"
    :class="dark ? 'text-gray-300' : 'text-gray-600'"
    x-text="t('hero.sub')"></p>

  <!-- 3 · CTA principal -->
  <div class="relative flex flex-col sm:flex-row gap-4 justify-center">
    <a href="https://github.com/albertolicea00/PocketPlayer" target="_blank"
      class="inline-flex items-center gap-2 px-8 py-4 rounded-2xl font-bold text-base transition-all neon-btn"
      :class="dark ? 'bg-neon text-ocean' : 'bg-blue text-white'">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483
          0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466
          -.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832
          .092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688
          -.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004
          1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7
          1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.92.359.31.678.921.678 1.856 0
          1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484
          17.522 2 12 2z"/>
      </svg>
      <span x-text="t('hero.cta1')"></span>
    </a>
    <a href="#notify"
      class="inline-flex items-center gap-2 px-8 py-4 rounded-2xl font-bold text-base border transition-all"
      :class="dark ? 'border-neon/40 text-neon hover:bg-neon/10' : 'border-blue/40 text-blue hover:bg-blue/5'">
      🔔 <span x-text="t('hero.cta2')"></span>
    </a>
  </div>

  <!-- Scroll hint -->
  <div class="relative mt-16 flex flex-col items-center gap-2 animate-bounce"
    :class="dark ? 'text-gray-500' : 'text-gray-400'">
    <span class="text-xs" x-text="t('hero.scroll')"></span>
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </div>
</section>

<!-- ══════════════════════════════════════
     4 · APP PREVIEW
══════════════════════════════════════ -->
<section id="preview" class="py-20 px-4">
  <div class="max-w-5xl mx-auto text-center">
    <p class="text-xs font-semibold tracking-widest uppercase mb-3"
      :class="dark ? 'text-neon' : 'text-blue'"
      x-text="t('preview.tag')"></p>
    <h2 class="text-3xl sm:text-4xl font-black mb-4" x-text="t('preview.title')"></h2>
    <p class="text-base max-w-xl mx-auto mb-14"
      :class="dark ? 'text-gray-400' : 'text-gray-500'"
      x-text="t('preview.sub')"></p>

    <div class="flex flex-col md:flex-row items-center justify-center gap-10">

      <!-- iPhone mockup placeholder
           REEMPLAZAR con: captura del simulador iPhone en Xcode
           Pantalla: MainView (lista de archivos, botón transferir, indicador storage Watch)
           Dimensiones: 390×844 px (iPhone 14 Pro) — usar <img src="img/iphone-screen.png"> -->
      <div class="float-anim flex flex-col items-center gap-3">
        <div class="w-48 h-96 rounded-[2.5rem] border-4 flex flex-col overflow-hidden"
          :class="dark
            ? 'border-neon/50 bg-deep neon-border'
            : 'border-[#1567A8]/60 bg-white shadow-[0_0_0_1px_#1567A844,0_4px_24px_#1567A833]'">
          <div class="flex justify-center pt-3 pb-1">
            <div class="w-20 h-4 rounded-full" :class="dark ? 'bg-ocean' : 'bg-gray-200'"></div>
          </div>
          <div class="flex-1 px-3 py-2 flex flex-col gap-2">
            <div class="text-xs font-bold text-left" :class="dark ? 'text-neon' : 'text-blue'">Pocket Player</div>
            <div class="h-1.5 rounded w-full" :class="dark ? 'bg-neon/20' : 'bg-blue/20'"></div>
            <div class="space-y-1.5 mt-2">
              <template x-for="f in ['song_01.mp3','podcast.m4a','album.mp3','track.mp3']">
                <div class="flex items-center justify-between p-1.5 rounded-lg"
                  :class="dark ? 'bg-white/5' : 'bg-blue/5'">
                  <div class="flex items-center gap-1.5">
                    <span class="text-xs">🎵</span>
                    <div class="w-20 h-2 rounded" :class="dark ? 'bg-gray-600' : 'bg-gray-300'"></div>
                  </div>
                  <span class="text-xs" :class="dark ? 'text-neon' : 'text-blue'">↑</span>
                </div>
              </template>
            </div>
            <div class="mt-auto">
              <div class="h-2 rounded-full overflow-hidden" :class="dark ? 'bg-white/10' : 'bg-blue/10'">
                <div class="h-full w-3/5 rounded-full" :class="dark ? 'bg-neon' : 'bg-blue'"></div>
              </div>
              <div class="text-xs mt-1 text-right" :class="dark ? 'text-gray-500' : 'text-gray-400'">Watch: 3.2 GB free</div>
            </div>
          </div>
          <div class="flex justify-center pb-3">
            <div class="w-16 h-1 rounded-full" :class="dark ? 'bg-gray-600' : 'bg-gray-300'"></div>
          </div>
        </div>
        <span class="text-xs font-medium" :class="dark ? 'text-gray-400' : 'text-gray-500'"
          x-text="t('preview.iphone')"></span>
      </div>

      <!-- Transfer arrow -->
      <div class="text-4xl" :class="dark ? 'text-neon neon-text' : 'text-blue'">
        <span class="hidden md:block">→</span>
        <span class="block md:hidden">↓</span>
      </div>

      <!-- Apple Watch mockup placeholder
           REEMPLAZAR con: captura del simulador Apple Watch en Xcode
           Pantalla: LibraryView (lista canciones) + PlayerView (controles)
           Dimensiones: 198×242 px (Series 7/8/9 45mm) — usar <img src="img/watch-screen.png"> -->
      <div class="float-anim flex flex-col items-center gap-3" style="animation-delay:1s">
        <div class="w-36 h-44 rounded-[1.8rem] border-4 flex flex-col overflow-hidden relative"
          :class="dark
            ? 'border-neon/50 bg-black neon-border'
            : 'border-[#1567A8]/70 bg-[#002641] shadow-[0_0_0_1px_#1567A844,0_4px_24px_#1567A833]'">
          <div class="absolute -right-2.5 top-8 w-2 h-8 rounded-full"
            :class="dark ? 'bg-gray-600' : 'bg-gray-500'"></div>
          <div class="flex-1 px-2.5 py-2 flex flex-col gap-1.5">
            <div class="text-xs font-bold text-center text-white">Library</div>
            <div class="space-y-1">
              <template x-for="s in ['Song One','My Podcast','Album Track']">
                <div class="flex items-center gap-1 p-1 rounded bg-white/10">
                  <span class="text-xs text-white">▶</span>
                  <div class="flex-1 h-2 rounded" style="background:#1567A888"></div>
                </div>
              </template>
            </div>
            <div class="mt-auto">
              <div class="h-1.5 rounded-full overflow-hidden bg-white/20">
                <div class="h-full w-2/5 rounded-full" style="background:#B2F4FF"></div>
              </div>
            </div>
          </div>
          <div class="flex justify-center pb-2">
            <div class="w-10 h-0.5 rounded-full bg-white/20"></div>
          </div>
        </div>
        <span class="text-xs font-medium" :class="dark ? 'text-gray-400' : 'text-gray-500'"
          x-text="t('preview.watch')"></span>
      </div>

    </div>
  </div>
</section>

<div class="max-w-5xl mx-auto" :class="dark ? 'divider-neon' : 'divider-light'"></div>

<!-- ══════════════════════════════════════
     5 · FEATURES
══════════════════════════════════════ -->
<section id="features" class="py-20 px-4">
  <div class="max-w-5xl mx-auto">
    <div class="text-center mb-14">
      <p class="text-xs font-semibold tracking-widest uppercase mb-3"
        :class="dark ? 'text-neon' : 'text-blue'" x-text="t('features.tag')"></p>
      <h2 class="text-3xl sm:text-4xl font-black mb-4" x-text="t('features.title')"></h2>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <template x-for="f in features" :key="f.t">
        <div class="rounded-2xl p-6 border transition-all"
          :class="dark
            ? 'neon-card bg-deep/60 border-blue/20 hover:border-neon/40'
            : 'light-card bg-white border-[#1567A8]/20 hover:border-[#1567A8]/50'">
          <div class="text-3xl mb-4" x-text="f.icon"></div>
          <h3 class="font-bold text-base mb-2" x-text="f.t"></h3>
          <p class="text-sm leading-relaxed" :class="dark ? 'text-gray-400' : 'text-gray-500'" x-text="f.d"></p>
        </div>
      </template>
    </div>
  </div>
</section>

<div class="max-w-5xl mx-auto" :class="dark ? 'divider-neon' : 'divider-light'"></div>

<!-- ══════════════════════════════════════
     6 · WHAT YOU CAN DO
══════════════════════════════════════ -->
<section id="whatyoucando" class="py-20 px-4">
  <div class="max-w-5xl mx-auto">
    <div class="text-center mb-14">
      <p class="text-xs font-semibold tracking-widest uppercase mb-3"
        :class="dark ? 'text-neon' : 'text-blue'" x-text="t('cando.tag')"></p>
      <h2 class="text-3xl sm:text-4xl font-black mb-4" x-text="t('cando.title')"></h2>
      <p class="text-base max-w-xl mx-auto" :class="dark ? 'text-gray-400' : 'text-gray-500'"
        x-text="t('cando.sub')"></p>
    </div>
    <div class="grid sm:grid-cols-2 gap-4 max-w-3xl mx-auto">
      <template x-for="item in t('cando.items')" :key="item">
        <div class="flex items-start gap-3 p-4 rounded-xl border"
          :class="dark ? 'border-neon/15 bg-deep/40' : 'border-blue/15 bg-white'">
          <span class="font-bold mt-0.5" :class="dark ? 'text-neon' : 'text-blue'">✓</span>
          <span class="text-sm" x-text="item"></span>
        </div>
      </template>
    </div>
  </div>
</section>

<div class="max-w-5xl mx-auto" :class="dark ? 'divider-neon' : 'divider-light'"></div>

<!-- ══════════════════════════════════════
     7 · HOW IT WORKS
══════════════════════════════════════ -->
<section id="howto" class="py-20 px-4">
  <div class="max-w-4xl mx-auto">
    <div class="text-center mb-14">
      <p class="text-xs font-semibold tracking-widest uppercase mb-3"
        :class="dark ? 'text-neon' : 'text-blue'" x-text="t('how.tag')"></p>
      <h2 class="text-3xl sm:text-4xl font-black mb-4" x-text="t('how.title')"></h2>
    </div>
    <div class="space-y-6">
      <template x-for="(step, i) in t('how.steps')" :key="i">
        <div class="flex gap-5 items-start">
          <div class="shrink-0 w-10 h-10 rounded-full flex items-center justify-center font-black text-sm neon-border"
            :class="dark ? 'bg-neon/15 text-neon border border-neon/30' : 'bg-blue/10 text-blue border border-blue/30'"
            x-text="i + 1"></div>
          <div class="pt-1.5">
            <h3 class="font-bold mb-1" x-text="step.t"></h3>
            <p class="text-sm" :class="dark ? 'text-gray-400' : 'text-gray-500'" x-text="step.d"></p>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>

<div class="max-w-5xl mx-auto" :class="dark ? 'divider-neon' : 'divider-light'"></div>

<!-- ══════════════════════════════════════
     USER MANUAL
══════════════════════════════════════ -->
<section id="manual" class="py-20 px-4">
  <div class="max-w-4xl mx-auto">
    <div class="text-center mb-14">
      <p class="text-xs font-semibold tracking-widest uppercase mb-3"
        :class="dark ? 'text-neon' : 'text-blue'" x-text="t('manual.tag')"></p>
      <h2 class="text-3xl sm:text-4xl font-black mb-4" x-text="t('manual.title')"></h2>
      <p class="text-base max-w-xl mx-auto" :class="dark ? 'text-gray-400' : 'text-gray-500'"
        x-text="t('manual.sub')"></p>
    </div>

    <!-- Accordion — uses local state via x-data on each item -->
    <div class="space-y-4">
      <template x-for="section in manualSections" :key="section.title">
        <div class="rounded-2xl border overflow-hidden"
          :class="dark ? 'border-blue/20 bg-deep/40' : 'border-blue/15 bg-white'">
          <button @click="section.open = !section.open"
            class="w-full flex items-center justify-between p-5 text-left font-semibold text-sm transition-colors"
            :class="dark ? 'hover:bg-neon/5' : 'hover:bg-blue/5'">
            <span class="flex items-center gap-3">
              <span x-text="section.icon" class="text-xl"></span>
              <span x-text="section.title"></span>
            </span>
            <svg class="w-4 h-4 transition-transform" :class="section.open ? 'rotate-180' : ''"
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div x-show="section.open"
            class="border-t px-5 pb-5 pt-4 text-sm space-y-3"
            :class="dark ? 'border-blue/20 text-gray-300' : 'border-blue/10 text-gray-600'">
            <template x-for="(step, j) in section.steps" :key="j">
              <div class="flex gap-3">
                <span class="shrink-0 w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold"
                  :class="dark ? 'bg-neon/15 text-neon' : 'bg-blue/10 text-blue'"
                  x-text="j + 1"></span>
                <p x-text="step"></p>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>

<div class="max-w-5xl mx-auto" :class="dark ? 'divider-neon' : 'divider-light'"></div>

<!-- ══════════════════════════════════════
     8 · PRIVACY
══════════════════════════════════════ -->
<section id="privacy" class="py-20 px-4">
  <div class="max-w-4xl mx-auto">
    <div class="text-center mb-14">
      <p class="text-xs font-semibold tracking-widest uppercase mb-3"
        :class="dark ? 'text-neon' : 'text-blue'" x-text="t('privacy.tag')"></p>
      <h2 class="text-3xl sm:text-4xl font-black mb-4" x-text="t('privacy.title')"></h2>
    </div>
    <div class="grid sm:grid-cols-3 gap-6">
      <template x-for="p in t('privacy.items')" :key="p.t">
        <div class="text-center p-6 rounded-2xl border"
          :class="dark ? 'border-neon/15 bg-deep/40' : 'border-blue/15 bg-white'">
          <div class="text-4xl mb-4" x-text="p.icon"></div>
          <h3 class="font-bold mb-2" x-text="p.t"></h3>
